        "description": "SDKWork auth token carried as Authorization: Bearer <auth_token>."
      },
      "AccessToken": {
        "type": "apiKey",
        "in": "header",
        "name": "Access-Token",
        "description": "SDKWork access isolation token."
      }
    },
    "schemas": {
      "ImageApiResult": {
        "type": "object",
        "additionalProperties": false,
        "required": [
          "code",
          "message",
          "requestId",
          "data"
        ],
        "properties": {
          "code": {
            "type": "string"
          },
          "message": {
            "type": "string"
          },
          "requestId": {
            "type": "string",
            "format": "uuid",
            "description": "Server-owned request correlation id."
          },
          "data": {
            "type": "object",
            "additionalProperties": true
          }
        }
      },
      "ImageOperationCommand": {
        "type": "object",
        "additionalProperties": true,
        "description": "Operation-specific image command payload defined by the owning sdkwork-image Rust module."
      },
      "ImageGenerationCommand": {
        "type": "object",
        "additionalProperties": false,
        "required": [
          "prompt",
          "scene"
        ],
        "properties": {
          "prompt": {
            "type": "string",
            "minLength": 1,
            "maxLength": 8000
          },
          "negativePrompt": {
            "type": [
              "string",
              "null"
            ],
            "maxLength": 8000
          },
          "scene": {
            "type": "string",
            "minLength": 1,
            "maxLength": 128,
            "pattern": "^[A-Za-z0-9._:@-]+$",
            "description": "Business scene recorded on generated Drive files for filtering and lifecycle governance."
          },
          "providerCode": {
            "type": [
              "string",
              "null"
            ],
            "maxLength": 128
          },
          "model": {
            "type": [
              "string",
              "null"
            ],
            "maxLength": 128
          },
          "resolution": {
            "type": [
              "string",
              "null"
            ],
            "maxLength": 64
          },
          "style": {
            "type": [
              "string",
              "null"
            ],
            "maxLength": 128
          },
          "outputCount": {
            "type": [
              "integer",
              "null"
            ],
            "minimum": 1,
            "maximum": 16,
            "default": 1
          },
          "referenceImages": {
            "type": "array",
            "maxItems": 16,
            "items": {
              "type": "string",
              "minLength": 1,
              "maxLength": 2048
            },
            "default": []
          },
          "webhookUrl": {
            "type": [
              "string",
              "null"
            ],
            "format": "uri"
          },
          "idempotencyKey": {
            "type": [
              "string",
              "null"
            ],
            "maxLength": 128
          }
        }
      },
      "ImageGenerationRefreshCommand": {
        "type": "object",
        "additionalProperties": false,
        "properties": {
          "forceProviderPoll": {
            "type": [
              "boolean",
              "null"
            ],
            "default": false
          },
          "importReadyOutputs": {
            "type": [
              "boolean",
              "null"
            ],
            "default": true
          }
        }
      },
      "ImageGenerationRetryCommand": {
        "type": "object",
        "additionalProperties": false,
        "properties": {
          "retryProviderDispatch": {
            "type": [
              "boolean",
              "null"
            ],
            "default": true
          },
          "retryDriveImport": {
            "type": [
              "boolean",
              "null"
            ],
            "default": true
          },
          "reason": {
            "type": [
              "string",
              "null"
            ],
            "maxLength": 512
          }
        }
      },
